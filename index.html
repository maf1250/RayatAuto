<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أداة دمج جداول المحاضرات الذكية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    
    <!-- مكتبات معالجة الإكسيل -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/exceljs/dist/exceljs.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #f4f9f8;
            color: #333;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            max-width: 650px;
            width: 100%;
            position: relative;
        }

        .youtube-btn {
            position: absolute;
            top: 15px;
            left: 15px;
            width: 50px;
            height: 50px;
            background: #FF0000;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            box-shadow: 0 4px 10px rgba(0,0,0,.2);
            transition: all .25s ease;
        }

        .youtube-btn:hover { transform: scale(1.1); background: #cc0000; }
        
        h1 {
            text-align: center;
            color: #008e7e;
            font-size: 24px;
            margin-bottom: 20px;
        }
        .step-title {
            text-align: center;
            color: #008e7e;
            font-size: 18px;
            margin-bottom: 20px;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .step {
            display: none;
            animation: fadeIn 0.4s ease-in-out;
        }
        .step.active { display: block; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .upload-group {
            margin-bottom: 20px;
            background: #fafdfa;
            border: 2px dashed #8dc63f;
            padding: 15px;
            border-radius: 8px;
        }
        .upload-group label {
            display: flex;
            align-items: center;
            font-weight: 600;
            margin-bottom: 10px;
            color: #008e7e;
            gap: 8px;
        }
        .settings-group {
            background: #eef7f6;
            border: 1px solid #cbe6e3;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .settings-row {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 15px;
            justify-content: center;
        }
        .settings-row div { flex: 1; min-width: 140px; display: flex; flex-direction: column; align-items: center; }
        .settings-row input { width: 85px; padding: 6px; border: 1px solid #ccc; border-radius: 4px; text-align: center; }

        .times-table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
            background: #fff;
            margin-bottom: 10px;
        }
        .times-table th, .times-table td { border: 1px solid #ccc; padding: 6px; font-size: 13px; }
        .times-table th { background: #cbe6e3; color: #006d60; }
        
        .btn-process {
            background-color: #008e7e;
            color: #fff;
            border: none;
            padding: 15px 20px;
            width: 100%;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-process:hover { background-color: #006d60; }
        .btn-secondary { background-color: #6c757d; }
        .btn-secondary:hover { background-color: #5a6268; }

        .result-card {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }
        .result-success-icon { color: #28a745; font-size: 48px; margin-bottom: 10px; }
        .result-info { font-size: 18px; margin: 10px 0; color: #333; }
        .warning-box {
            background-color: #fff8e1;
            border-right: 5px solid #ffc107;
            padding: 15px;
            text-align: right;
            border-radius: 4px;
            margin-top: 20px;
        }
        .warning-title { color: #856404; font-weight: 800; margin-bottom: 10px; display: flex; align-items: center; gap: 5px; }

        .lucide-spin { animation: spin 1.5s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="container">
        <a href="https://youtu.be/CaZTUCzXPnY" target="_blank" class="youtube-btn" title="لمشاهدة الشرح">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="white">
                <path d="M23.5 6.2c-.3-1.2-1.2-2.1-2.4-2.4C19 3.2 12 3.2 12 3.2s-7 0-9.1.6C1.7 4.1.8 5 .5 6.2 0 8.3 0 12 0 12s0 3.7.5 5.8c.3 1.2 1.2 2.1 2.4 2.4C5 20.8 12 20.8 12 20.8s7 0 9.1-.6c1.2-.3 2.1-1.2 2.4-2.4.5-2.1.5-5.8.5-5.8s0-3.7-.5-5.8zM9.6 15.5V8.5L15.8 12l-6.2 3.5z"/>
            </svg>
        </a>

        <h1>أداة دمج جداول المحاضرات</h1> 
        
        <!-- الخطوة 1 -->
        <div id="step1" class="step active">
            <h2 class="step-title"><i data-lucide="folder-open"></i> الخطوة 1: رفع الملفات الأساسية</h2>
            <div class="upload-group">
                <label for="ss01_file"><i data-lucide="file-spreadsheet"></i> 1. تقرير جداول الوحدة التدريبية طولي (SS01)</label>
                <input type="file" id="ss01_file" accept=".csv, .xlsx, .xls">
            </div>
            <div class="upload-group">
                <label for="sl03_file"><i data-lucide="graduation-cap"></i> 2. تقرير أعضاء هيئة التدريب (SL03)</label>
                <input type="file" id="sl03_file" accept=".csv, .xlsx, .xls">
            </div>
            <div class="upload-group">
                <label for="timetables_file"><i data-lucide="calendar-days"></i> 3. ملف الجدول المستخرج من (aSc Timetables)</label>
                <input type="file" id="timetables_file" accept=".csv, .xlsx, .xml, .xls">
            </div>
            <button class="btn-process" onclick="goToStep2()">التالي: إعداد أوقات المحاضرات <i data-lucide="arrow-left"></i></button>
            <div id="step1-status" class="status-msg" style="text-align: center; margin-top:10px;"></div>
        </div>

        <!-- الخطوة 2 -->
        <div id="step2" class="step">
            <h2 class="step-title"><i data-lucide="clock"></i> الخطوة 2: إعداد أوقات المحاضرات</h2>
            <div class="settings-group">
                <div class="settings-row">
                    <div><label>وقت بدء الأولى:</label><input type="time" id="startTime" value="08:00" onchange="generateTimes()"></div>
                    <div><label>مدة المحاضرة:</label><input type="number" id="duration" value="50" onchange="generateTimes()"></div>
                    <div><label>الاستراحة:</label><input type="number" id="defaultBreakTime" value="5" onchange="generateTimes()"></div>
                </div>
                <table class="times-table">
                    <thead><tr><th>المحاضرة</th><th>البدء</th><th>الانتهاء</th><th>الاستراحة</th></tr></thead>
                    <tbody id="timesBody"></tbody>
                </table>
                <div style="text-align: center; font-size: 13px; color: #006d60;">
                    <input type="checkbox" id="adjustEvenPeriods" checked> إضافة دقيقة للمحاضرات الفردية (تفادياً للتعارض)
                </div>
            </div>
            <div class="btn-group" style="display: flex; gap: 10px;">
                <button class="btn-process btn-secondary" onclick="goToStep1()"><i data-lucide="arrow-right"></i> السابق</button>
                <button class="btn-process" id="processBtn" onclick="processFiles()"><i data-lucide="rocket"></i> استخراج الجدول النهائي</button>
            </div>
        </div>

        <!-- الخطوة 3: صفحة النتائج -->
        <div id="step3" class="step">
            <div class="result-card">
                <div class="result-success-icon"><i data-lucide="party-popper" style="width: 60px; height: 60px;"></i></div>
                <h2 style="color: #008e7e; margin-top: 0;">تمت المعالجة بنجاح!</h2>
                <p class="result-info" id="final-count-text"></p>
                
                <div id="warning-section" class="warning-box" style="display:none;">
                    <div class="warning-title"><i data-lucide="alert-triangle"></i> تنبيه هام:</div>
                    <p id="missing-rows-text" style="margin: 5px 0; font-weight: bold;"></p>
                    <p id="missing-cols-text" style="margin: 5px 0; color: #bc810d;"></p>
                    <p style="font-size: 13px; color: #666; margin-top: 10px; border-top: 1px solid #ffeeba; padding-top: 10px;">
                        <i data-lucide="info" style="width: 14px; height: 14px; vertical-align: middle;"></i> 
                        نأمل فتح الملف، ومراجعة هذه الخانات وتعبئتها أو التأكد من سبب عدم تطابقها.
                    </p>
                </div>
            </div>
            <button class="btn-process" onclick="window.location.reload()"><i data-lucide="refresh-cw"></i> معالجة ملفات جديدة</button>
        </div>
    </div>

    <script>
        lucide.createIcons();
        let timesData = [];

        function goToStep2() {
            if (!document.getElementById('ss01_file').files[0] || !document.getElementById('sl03_file').files[0] || !document.getElementById('timetables_file').files[0]) {
                document.getElementById('step1-status').innerHTML = "<span style='color:red;'>نأمل رفع جميع الملفات أولاً!</span>";
                return;
            }
            document.getElementById('step1').classList.remove('active');
            document.getElementById('step2').classList.add('active');
            if(timesData.length === 0) generateTimes();
        }

        function goToStep1() {
            document.getElementById('step2').classList.remove('active');
            document.getElementById('step1').classList.add('active');
        }

        function timeToMinutes(t) { let [h, m] = t.split(':').map(Number); return h * 60 + m; }
        function minutesToTime(mins) { 
            let h = Math.floor(mins / 60) % 24; 
            let m = mins % 60; 
            return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`; 
        }

        function generateTimes() {
            let currentMins = timeToMinutes(document.getElementById('startTime').value || "08:00");
            let duration = parseInt(document.getElementById('duration').value) || 50;
            let defBreak = parseInt(document.getElementById('defaultBreakTime').value) || 5;
            timesData = [];
            for (let i = 1; i <= 10; i++) {
                let breakAfter = (i % 2 === 0 && i < 10) ? defBreak : 0;
                timesData.push({ period: i, startMins: currentMins, endMins: currentMins + duration, breakAfter: breakAfter });
                currentMins += duration + breakAfter;
            }
            renderTable();
        }

        function renderTable() {
            let tbody = document.getElementById('timesBody');
            tbody.innerHTML = timesData.map((d, i) => `
                <tr>
                    <td><b>${d.period}</b></td>
                    <td><input type="time" value="${minutesToTime(d.startMins)}" onchange="updateStart(${i}, this.value)"></td>
                    <td><input type="time" value="${minutesToTime(d.endMins)}" onchange="updateEnd(${i}, this.value)"></td>
                    <td>${i < 9 ? `<input type="number" value="${d.breakAfter}" style="width:40px" onchange="updateBreak(${i}, this.value)">` : '-'}</td>
                </tr>
            `).join('');
        }

        function updateBreak(i, v) { timesData[i].breakAfter = parseInt(v) || 0; recalculate(i+1); }
        function updateStart(i, v) { 
            let dur = timesData[i].endMins - timesData[i].startMins;
            timesData[i].startMins = timeToMinutes(v);
            timesData[i].endMins = timesData[i].startMins + dur;
            recalculate(i+1); 
        }
        function updateEnd(i, v) { timesData[i].endMins = timeToMinutes(v); recalculate(i+1); }
        function recalculate(start) {
            for (let i = start; i < timesData.length; i++) {
                let prev = timesData[i-1];
                let dur = timesData[i].endMins - timesData[i].startMins;
                timesData[i].startMins = prev.endMins + prev.breakAfter;
                timesData[i].endMins = timesData[i].startMins + dur;
            }
            renderTable();
        }

        async function readFileAsync(f) {
            return new Promise((resolve) => {
                let r = new FileReader();
                let isCSV = f.name.toLowerCase().endsWith('.csv');
                r.onload = e => {
                    let wb = isCSV ? XLSX.read(e.target.result, {type:'string'}) : XLSX.read(new Uint8Array(e.target.result), {type:'array'});
                    let json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {defval:""});
                    resolve(json.map(row => {
                        let n = {}; for (let k in row) n[k.toString().trim()] = row[k]; return n;
                    }));
                };
                if (isCSV) r.readAsText(f, 'windows-1256'); else r.readAsArrayBuffer(f);
            });
        }

        function normalize(s) { return s ? s.replace(/[أإآ]/g,'ا').replace(/ة/g,'ه').replace(/ى/g,'ي').replace(/عبد\s+/g,'عبد').replace(/\s+/g,' ').trim() : ""; }
        function isNameMatch(n1, n2) {
            let s1 = normalize(n1), s2 = normalize(n2);
            if (s1 === s2) return true;
            let p1 = s1.split(' '), p2 = s2.split(' ');
            if (p1[0] !== p2[0] || p1[p1.length-1] !== p2[p2.length-1]) return false;
            return true;
        }

        function extractBase(s) { if(!s) return ""; let c = s.toString().replace(/\(ع\)| ع |عملي|نظري/g,''); return (c.match(/[a-zA-Zأ-ي]+/g)||[]).join('') + (c.match(/\d+/g)||[]).join(''); }

        async function processFiles() {
            let btn = document.getElementById('processBtn');
            try {
                btn.disabled = true;
                btn.innerHTML = `<i data-lucide="loader-2" class="lucide-spin"></i> جارٍ المعالجة...`;
                lucide.createIcons();

                let ss01 = await readFileAsync(document.getElementById('ss01_file').files[0]);
                let sl03 = await readFileAsync(document.getElementById('sl03_file').files[0]);
                let tt = await readFileAsync(document.getElementById('timetables_file').files[0]);

                let pMap = {}; timesData.forEach(d => pMap[d.period] = { s: minutesToTime(d.startMins), e: minutesToTime(d.endMins) });

                let lectures = [];
                tt.forEach(r => {
                    let pid = parseInt(r['PeriodID'] || r['المحاضرة']);
                    let dayStr = String(r['Cycle Day'] || r['اليوم'] || "");
                    if (!pid || pid > 10) return;
                    let days = [];
                    if (dayStr[0]=='1') days.push({n:'الأحد', o:1});
                    if (dayStr[1]=='1') days.push({n:'الإثنين', o:2});
                    if (dayStr[2]=='1') days.push({n:'الثلاثاء', o:3});
                    if (dayStr[3]=='1') days.push({n:'الأربعاء', o:4});
                    if (dayStr[4]=='1') days.push({n:'الخميس', o:5});
                    
                    days.forEach(d => {
                        lectures.push({
                            term: String(r['SchoolDBN']||""), code: String(r['CourseCode']||""), sec: String(r['SectionID']||""), 
                            name: String(r['Course name']||""), day: d.n, dayO: d.o, teacher: String(r['Teacher Name']||""), 
                            room: String(r['Room']||""), startP: pid, endP: pid
                        });
                    });
                });

                lectures.sort((a,b) => a.sec.localeCompare(b.sec) || a.dayO - b.dayO || a.startP - b.startP);

                let merged = [];
                lectures.forEach(curr => {
                    if (merged.length > 0) {
                        let last = merged[merged.length-1];
                        if (last.sec === curr.sec && last.day === curr.day && last.name === curr.name && last.teacher === curr.teacher) {
                            let diff = timeToMinutes(pMap[curr.startP].s) - timeToMinutes(pMap[last.endP].e);
                            if (diff <= 65 && diff >= 0) { last.endP = curr.endP; return; }
                        }
                    }
                    merged.push({...curr});
                });

                let finalData = [];
                let usedSs01 = new Set();
                let adj = document.getElementById('adjustEvenPeriods').checked;

                merged.forEach(l => {
                    let ts = pMap[l.startP].s, te = pMap[l.endP].e;
                    if (adj && l.startP % 2 === 0) { ts = minutesToTime(timeToMinutes(ts)+1); if(l.startP === l.endP) te = minutesToTime(timeToMinutes(te)+1); }
                    
                    let isPrac = l.name.includes('عملي') || l.code.includes(' ع');
                    let rBase = extractBase(l.code) || extractBase(l.name);
                    
                    let trId = "";
                    let mTr = sl03.find(s => isNameMatch(l.teacher, s['اسم المدرب'] || s['الاسم']));
                    if (mTr) trId = String(mTr['رقم الحاسب'] || mTr['الرقم الوظيفي'] || "").padStart(7,'0');

                    let mSs = ss01.find((s, idx) => {
                        if (usedSs01.has(idx)) return false;
                        let sBase = extractBase(s['رمز المقرر'] || s['المقرر']);
                        return sBase === rBase && isNameMatch(l.teacher, s['اسم المدرب']);
                    });

                    finalData.push({
                        "الفصل التدريبي": l.term,
                        "الرقم المرجعي": mSs ? (mSs['الرقم المرجعي'] || mSs['CRN']) : "",
                        "اليوم": l.day,
                        "الوقت": `${ts} - ${te}`,
                        "المبنى": l.room ? l.room.substring(0,5) : "",
                        "القاعة": l.room,
                        "رقم المدرب": trId,
                        "اسم المدرب": l.teacher,
                        "اسم المقرر": l.name,
                        "رمز المقرر": l.code,
                        "الشعبة": l.sec,
                        "نوع المحاضرة": isPrac ? "عملي" : "نظري"
                    });
                });

                // تصدير الإكسيل
                const workbook = new ExcelJS.Workbook();
                const worksheet = workbook.addWorksheet("الجدول", { views: [{ rightToLeft: true }] });
                worksheet.columns = Object.keys(finalData[0]).map(k => ({ header: k, key: k, width: 15 }));
                finalData.forEach(row => worksheet.addRow(row));
                const buffer = await workbook.xlsx.writeBuffer();
                const blob = new Blob([buffer], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
                const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = "Rayat_Schedule.xlsx"; link.click();

                // حساب النواقص للعرض في الصفحة الثالثة
                let missingCount = 0;
                let missingCols = new Set();
                finalData.forEach(r => {
                    let hasM = false;
                    ["الفصل التدريبي", "الرقم المرجعي", "اليوم", "الوقت", "المبنى", "القاعة", "رقم المدرب"].forEach(c => {
                        if (!r[c] || String(r[c]).trim() === "") { hasM = true; missingCols.add(c); }
                    });
                    if(hasM) missingCount++;
                });

                // الانتقال للصفحة الثالثة
                document.getElementById('step2').classList.remove('active');
                document.getElementById('step3').classList.add('active');
                document.getElementById('final-count-text').innerText = `عدد الصفوف النهائية: ${finalData.length}`;
                
                if (missingCount > 0) {
                    document.getElementById('warning-section').style.display = 'block';
                    document.getElementById('missing-rows-text').innerText = `عدد الصفوف التي تحتوي على خانات فارغة: ${missingCount}`;
                    document.getElementById('missing-cols-text').innerText = `النقص موجود في عمود/أعمدة: [ ${Array.from(missingCols).join('، ')} ]`;
                }

            } catch (e) {
                alert("خطأ: " + e.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<i data-lucide="rocket"></i> استخراج الجدول النهائي`;
                lucide.createIcons();
            }
        }
    </script>
</body>
</html>
