<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أداة دمج جداول المحاضرات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            font-size: 24px;
            margin-bottom: 30px;
        }
        .upload-group {
            margin-bottom: 25px;
            background: #f8f9fa;
            border: 2px dashed #ced4da;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        .upload-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 10px;
            color: #495057;
        }
        input[type="file"] {
            display: block;
            width: 100%;
            font-family: inherit;
        }
        .btn-process {
            background-color: #28a745;
            color: #fff;
            border: none;
            padding: 15px 20px;
            width: 100%;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Cairo', sans-serif;
        }
        .btn-process:hover {
            background-color: #218838;
        }
        .btn-process:disabled {
            background-color: #a5d8b2;
            cursor: not-allowed;
        }
        #status {
            text-align: center;
            margin-top: 15px;
            font-weight: 600;
        }
        .success { color: #28a745; }
        .error { color: #dc3545; }
        .note { font-size: 13px; color: #6c757d; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>أداة دمج جداول المحاضرات (RayatAuto & SS01)</h1>
        
        <div class="upload-group">
            <label for="ss01_file">1. ارفع تقرير (ss01) 📄</label>
            <input type="file" id="ss01_file" accept=".csv, .xlsx, .xls">
            <div class="note">يدعم ملفات الإكسل و CSV</div>
        </div>

        <div class="upload-group">
            <label for="rayat_file">2. ارفع ملف (RayatAuto) 📄</label>
            <input type="file" id="rayat_file" accept=".csv, .xlsx, .xls">
            <div class="note">يدعم ملفات الإكسل و CSV</div>
        </div>

        <button class="btn-process" id="processBtn" onclick="processFiles()">معالجة واستخراج الملف الجديد</button>
        
        <div id="status"></div>
    </div>

    <script>
        // دالة ذكية لقراءة الملفات وتفكيك ترميز CSV العربي وتنظيف المسافات
        function readFileAsync(file) {
            return new Promise((resolve, reject) => {
                let reader = new FileReader();
                let isCSV = file.name.toLowerCase().endsWith('.csv');

                reader.onload = function(e) {
                    try {
                        let workbook;
                        if (isCSV) {
                            // قراءة النص مباشرة لمعالجة ترميز CSV
                            workbook = XLSX.read(e.target.result, {type: 'string'});
                        } else {
                            // قراءة كبيانات ثنائية للإكسل
                            let data = new Uint8Array(e.target.result);
                            workbook = XLSX.read(data, {type: 'array'});
                        }

                        let firstSheetName = workbook.SheetNames[0];
                        let worksheet = workbook.Sheets[firstSheetName];
                        let json = XLSX.utils.sheet_to_json(worksheet, {defval: ""});

                        // تنظيف أسماء الأعمدة (حذف المسافات الزائدة في البداية والنهاية)
                        let cleanedJson = json.map(row => {
                            let newRow = {};
                            for (let key in row) {
                                newRow[key.toString().trim()] = row[key];
                            }
                            return newRow;
                        });

                        resolve(cleanedJson);
                    } catch (err) {
                        reject(err);
                    }
                };
                reader.onerror = reject;

                if (isCSV) {
                    // استخدام ترميز ويندوز-1256 الخاص بالأنظمة العربية
                    reader.readAsText(file, 'windows-1256');
                } else {
                    reader.readAsArrayBuffer(file);
                }
            });
        }

        // دالة تحديد المقرر العملي
        function isPractical(courseName, courseCode) {
            let name = String(courseName || "").trim();
            let code = String(courseCode || "").trim();
            if (name.endsWith(' ع') || name.endsWith('(ع)') || name.includes('عملي')) return true;
            if (code.includes('(ع)') || code.endsWith(' ع')) return true;
            return false;
        }

        // دالة تنظيف واستخراج رمز المقرر (حروف وأرقام فقط)
        function extractCourseBase(str) {
            if (!str) return "";
            let cleaned = str.toString().replace(/\(ع\)/g, '').replace(/ ع /g, ' ').replace(/عملي/g, '').replace(/نظري/g, '');
            let lettersMatch = cleaned.match(/[a-zA-Zأ-ي]+/g);
            let letters = lettersMatch ? lettersMatch.join('') : '';
            let numbersMatch = cleaned.match(/\d+/g);
            let numbers = numbersMatch ? numbersMatch.join('') : '';
            return letters + numbers; 
        }

        async function processFiles() {
            let ss01File = document.getElementById('ss01_file').files[0];
            let rayatFile = document.getElementById('rayat_file').files[0];
            let statusDiv = document.getElementById('status');
            let btn = document.getElementById('processBtn');

            if (!ss01File || !rayatFile) {
                statusDiv.innerHTML = "<span class='error'>الرجاء رفع كلا الملفين أولاً!</span>";
                return;
            }

            try {
                btn.disabled = true;
                btn.innerText = "جاري المعالجة...";
                statusDiv.innerHTML = "";

                let ss01Data = await readFileAsync(ss01File);
                let rayatData = await readFileAsync(rayatFile);

                if (rayatData.length === 0) {
                    statusDiv.innerHTML = "<span class='error'>ملف RayatAuto لا يحتوي على بيانات أو أن الصيغة غير مدعومة! (يرجى حفظه كـ XLSX للتجربة).</span>";
                    return;
                }

                let finalData = [];

                rayatData.forEach(row => {
                    // إذا كان الصف فارغاً نتجاهله
                    if (!row['اسم المقرر'] && !row['رمز المقرر']) return;

                    let rCourseName = String(row['اسم المقرر'] || "").trim();
                    let rCourseCode = String(row['رمز المقرر'] || "").trim();
                    let rTrainer = String(row['اسم المدرب'] || row['اسم المدرس'] || "").trim();
                    
                    let isPrac = isPractical(rCourseName, rCourseCode);
                    let lectureType = isPrac ? 'عملي' : 'نظري';
                    
                    let rBase = extractCourseBase(rCourseCode) || extractCourseBase(rCourseName);

                    let matchedRow = ss01Data.find(sRow => {
                        let sTrainer = String(sRow['اسم المدرب'] || sRow['المدرب'] || sRow['اسم المدرس'] || "").trim();
                        let sType = String(sRow['نوع الجدولة'] || sRow['نوع الشعبة'] || "").trim();
                        let sBase = extractCourseBase(sRow['رمز المقرر'] || sRow['المقرر'] || sRow['اسم المقرر']);
                        
                        let trainerMatch = (sTrainer === rTrainer) || (sTrainer && rTrainer && (sTrainer.includes(rTrainer) || rTrainer.includes(sTrainer)));
                        let codeMatch = (sBase === rBase);
                        
                        let typeMatch = false;
                        if (isPrac && sType.includes('عملي')) typeMatch = true;
                        if (!isPrac && sType.includes('نظري')) typeMatch = true;
                        if (!sType) typeMatch = true; // في حال عدم وجود عمود للنوع نعتبره متطابقاً

                        return trainerMatch && codeMatch && typeMatch;
                    });

                    let fetchedCRN = matchedRow ? (matchedRow['الرقم المرجعي'] || matchedRow['CRN'] || "") : "";
                    let fetchedTrainerId = matchedRow ? (matchedRow['رقم المدرب'] || matchedRow['رقم الموظف'] || "") : "";

                    finalData.push({
                        "الفصل التدريبي": row['الفصل التدريبي'] || "",
                        "الرقم المرجعي": fetchedCRN || row['الرقم المرجعي'] || "",
                        "اليوم": row['اليوم'] || "",
                        "الوقت": row['الوقت'] || "",
                        "المبنى": row['المبنى'] || "",
                        "القاعة": row['القاعة'] || "",
                        "رقم المدرب": fetchedTrainerId || row['رقم المدرب'] || row['رقم المدرس'] || "",
                        "اسم المدرب": rTrainer,
                        "اسم المقرر": rCourseName,
                        "رمز المقرر": rCourseCode,
                        "الشعبة": row['الشعبة'] || "",
                        "نوع المحاضرة": lectureType
                    });
                });

                if (finalData.length === 0) {
                    statusDiv.innerHTML = "<span class='error'>حدث خطأ: لم يتم العثور على أعمدة متطابقة للبيانات!</span>";
                    return;
                }

                let newSheet = XLSX.utils.json_to_sheet(finalData);
                let newWorkbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(newWorkbook, newSheet, "الجدول النهائي");

                XLSX.writeFile(newWorkbook, "RayatAuto_New.xlsx");
                statusDiv.innerHTML = "<span class='success'> تم دمج البيانات وتحميل الملف بنجاح! (" + finalData.length + " صف)</span>";

            } catch (error) {
                console.error(error);
                statusDiv.innerHTML = "<span class='error'>حدث خطأ أثناء المعالجة: " + error.message + "</span>";
            } finally {
                btn.disabled = false;
                btn.innerText = "معالجة واستخراج الملف الجديد";
            }
        }
    </script>
</body>
</html>
